# OpenE2EE — mobile/android/gradle/wrapper/gradle-wrapper.properties
#
# PR-28 (Sprint 5) — first committed Gradle wrapper configuration.
#
# Sprint 9.6.3 hotfix: bumped from Gradle 8.5 → Gradle 8.10 LTS.
# Reason: Sprint 9.6.2 fix made `flutter_tools/gradle` resolve correctly
# (PATH-based `which flutter` derivation + flutter-version pin), but
# the live workflow_dispatch run AFTER Sprint 9.6.2 PR #14 push failed
# at `mobile/android/app/build.gradle.kts:80` with:
#
#   Error: Your project's Gradle version (8.5.0) is lower than Flutter's
#   minimum supported version of 8.7.0. Please upgrade your Gradle version.
#
# Flutter SDK 3.44.1 (project-wide pin via env.FLUTTER_VERSION) requires
# Gradle ≥ 8.7.0. We picked 8.10 LTS for stability — LTS support window
# Aug 2024 → Aug 2026, so we're aligned with Flutter's recommended
# support lifecycle. Newer (8.11+) is available but less battle-tested.
#
# When the developer runs `gradle wrapper` for the first time, the
# `gradle-wrapper.jar` binary is downloaded next to this file. The jar
# IS committed in this repo (Sprint 9.5 committed Gradle 8.5 wrapper;
# Sprint 9.6.3 updates it to Gradle 8.10 wrapper) — CI runners need
# the jar pre-staged so they don't need network access to download it.
# See `tools/workflow-yaml-audit.py` invariant check for the Gradle
# version floor (>= 8.7.0).
#
# Pinned to Gradle 8.4 — the minimum version that AGP 8.1.x supports
# (see https://developer.android.com/build/releases/gradle-plugin#updating-gradle).
# When the developer runs `gradle wrapper` for the first time, the
# `gradle-wrapper.jar` binary is downloaded next to this file. The jar
# is intentionally NOT committed (see .gitignore — generated artifacts
# don't belong in source control); regenerating it is a single command.
#
# distributionBase / distributionPath control where the wrapper caches
# the Gradle distribution. `GRADLE_USER_HOME` is the default; setting it
# to GRADLE_USER_HOME means the same cached distribution is shared
# across every project on the developer machine.

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.10-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists